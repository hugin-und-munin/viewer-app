<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Hugin und Munin Steuerungspanel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 32px;
      color: #1e1b4b;
    }
    h1 { font-size: 20px; margin-bottom: 24px; }
    h2 { font-size: 13px; font-weight: bold; text-transform: uppercase;
         letter-spacing: 0.05em; color: #888; margin-bottom: 10px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      max-width: 800px;
    }
    .section {
      background: #fff;
      border: 1px solid #e0e0e0;
      padding: 16px;
    }
    .section.wide {
      grid-column: span 2;
    }
    .row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
    button {
      background: #1e1b4b;
      color: #fff;
      border: none;
      padding: 8px 14px;
      font-size: 12px;
      cursor: pointer;
    }
    button:hover { background: #2d2a6b; }
    button.orange { background: #F09644; }
    button.orange:hover { background: #d07830; }
    textarea {
      width: 100%;
      height: 120px;
      font-family: monospace;
      font-size: 12px;
      padding: 10px;
      border: 1px solid #ccc;
      resize: vertical;
      margin-bottom: 8px;
    }
    .log {
      font-family: monospace;
      font-size: 12px;
      color: #555;
      margin-top: 16px;
      max-width: 1000px;
    }
    .log-entry { padding: 4px 0; border-bottom: 1px solid #eee; }
    .log-entry.ok { color: #2a7a2a; }
    .log-entry.err { color: #c0392b; }
  </style>
</head>
<body>
  <h1>Hugin und Munin Steuerungspanel</h1>

  <div class="grid">
    <div class="section">
      <h2>Pause</h2>
      <div class="row">
        <button onclick="sendPause(1)">Pause 1 min</button>
        <button onclick="sendPause(5)">Pause 5 min</button>
        <button onclick="sendPause(30)">Pause 30 min</button>
      </div>
    </div>

    <div class="section">
      <h2>Chat</h2>
      <div class="row">
        <button onclick="testChatStill()">Light ohne Ton</button>
        <button onclick="testChatDark()">Dark ohne Ton</button>
        <button onclick="testChatFemale()">Female</button>
        <button onclick="testChatMale()">Male</button>
      </div>
      <div class="row">
        <button onclick="testChatSmall()">Schrift Klein</button>
        <button onclick="testChatLarge()">Schrift Gross</button>
      </div>
    </div>

    <div class="section">
      <h2>Zeit</h2>
      <div class="row">
        <button onclick="testTime24()">24h</button>
        <button onclick="testTime12()">12h</button>
        <button onclick="testTimeSeconds()">Mit Sekunden</button>
        <button onclick="testTimeNoDate()">Kein Datum</button>
      </div>
    </div>

    <div class="section">
      <h2>Routine</h2>
      <div class="row">
        <button onclick="testRoutineStill()">Ohne Ton</button>
        <button onclick="testRoutineTon()">Mit Ton</button>
      </div>
    </div>

    <div class="section wide">
      <h2>Custom JSON</h2>
      <textarea id="json-input">{
  "command": "loadModule",
  "type": "Time",
  "module_id": "00000000-0000-0000-0003-000000000002",
  "duration": 30000,
  "format": "HH:mm",
  "showSeconds": false,
  "showDate": true,
  "interval": 30
}</textarea>
      <div class="row">
        <button class="orange" onclick="sendCustom()">Send</button>
      </div>
    </div>
  </div>

  <div class="log" id="log"></div>

  <script>
    const CHAT_ID    = "00000000-0000-0000-0003-000000000003";
    const TIME_ID    = "00000000-0000-0000-0003-000000000002";
    const ROUTINE_ID = "00000000-0000-0000-0003-000000000001";

    async function send(msg) {
      try {
        const res = await fetch("http://localhost:3001", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(msg),
        });
        if (res.ok) {
          log(`Gesendet: ${JSON.stringify(msg)}`, "ok");
        } else {
          log(`Serverfehler: ${res.status}`, "err");
        }
      } catch (e) {
        log(`Verbindung zu http://localhost:3001 fehlgeschlagen — läuft die App? (${e.message})`, "err");
      }
    }

    function sendPause(minutes) {
      send({ command: "pause", duration: minutes });
    }

    // ── Chat ──────────────────────────────────────────────────────────────

    function testChatStill() {
      send({ command: "loadModule", type: "Chat", module_id: CHAT_ID,
        duration: 300000, audio: false, theme: "light", fontSize: "large" });
    }

    function testChatDark() {
      send({ command: "loadModule", type: "Chat", module_id: CHAT_ID,
        duration: 300000, audio: false, theme: "dark", fontSize: "large" });
    }

    function testChatFemale() {
      send({ command: "loadModule", type: "Chat", module_id: CHAT_ID,
        duration: 300000, audio: true, voice: "female", theme: "dark", fontSize: "large" });
    }

    function testChatMale() {
      send({ command: "loadModule", type: "Chat", module_id: CHAT_ID,
        duration: 300000, audio: true, voice: "male", theme: "dark", fontSize: "large" });
    }

    function testChatSmall() {
      send({ command: "loadModule", type: "Chat", module_id: CHAT_ID,
        duration: 300000, audio: false, theme: "light", fontSize: "small" });
    }

    function testChatLarge() {
      send({ command: "loadModule", type: "Chat", module_id: CHAT_ID,
        duration: 300000, audio: false, theme: "light", fontSize: "large" });
    }

    // ── Zeit ──────────────────────────────────────────────────────────────

    function testTime24() {
      send({ command: "loadModule", type: "Time", module_id: TIME_ID,
        duration: 300000, format: "HH:mm", showSeconds: false, showDate: true, interval: 30 });
    }

    function testTime12() {
      send({ command: "loadModule", type: "Time", module_id: TIME_ID,
        duration: 300000, format: "hh:mm a", showSeconds: false, showDate: true, interval: 30 });
    }

    function testTimeSeconds() {
      send({ command: "loadModule", type: "Time", module_id: TIME_ID,
        duration: 300000, format: "HH:mm", showSeconds: true, showDate: true, interval: 30 });
    }

    function testTimeNoDate() {
      send({ command: "loadModule", type: "Time", module_id: TIME_ID,
        duration: 300000, format: "HH:mm", showSeconds: false, showDate: false, interval: 30 });
    }

    // ── Routine ───────────────────────────────────────────────────────────

    function testRoutineStill() {
      send({ command: "loadModule", type: "Routine", module_id: ROUTINE_ID,
        duration: 600000, audio: false });
    }

    function testRoutineTon() {
      send({ command: "loadModule", type: "Routine", module_id: ROUTINE_ID,
        duration: 600000, audio: true, voice: "male" });
    }

    // ── Custom ────────────────────────────────────────────────────────────

    function sendCustom() {
      try {
        const msg = JSON.parse(document.getElementById("json-input").value);
        send(msg);
      } catch (e) {
        log(`Invalid JSON: ${e.message}`, "err");
      }
    }

    function log(text, type = "") {
      const el = document.getElementById("log");
      const entry = document.createElement("div");
      entry.className = `log-entry ${type}`;
      entry.textContent = `${new Date().toLocaleTimeString()} — ${text}`;
      el.prepend(entry);
    }
  </script>
</body>
</html>
